<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f8f7f4'/><text x='50%' y='55%' font-size='50' text-anchor='middle' dominant-baseline='middle' fill='%234a5568'>📋</text></svg>">
  <link rel="manifest" href="data:application/manifest+json,{ %22name%22: %22每日计划%22, %22short_name%22: %22计划%22, %22start_url%22: %22.%22, %22display%22: %22standalone%22, %22background_color%22: %22%23f8f7f4%22, %22theme_color%22: %22%234a5568%22 }">
  <title>每日计划 · 手机版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: #f4f3ef;
      color: #2d3436;
      padding: 12px 10px 30px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      padding: 20px 16px 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .title { font-size: 20px; font-weight: 700; color: #3d3a35; }
    .date-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f9f8f6;
      border-radius: 12px;
      padding: 6px 12px;
      border: 1px solid #e0dcd2;
    }
    #datePicker {
      border: none;
      background: transparent;
      font-size: 13px;
      font-family: inherit;
      color: #2d3436;
      outline: none;
      font-weight: 500;
    }
    .today-btn {
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 3px 10px;
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }

    /* 时段卡片 */
    .period-card {
      margin-bottom: 14px;
      border-radius: 14px;
      background: #fefefb;
      border: 1px solid #e8e4db;
      overflow: hidden;
    }
    .period-header {
      background: #f8f6f0;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #e8e4db;
      color: #4a4440;
    }
    .period-header .icon { font-size: 18px; }
    .regular-list, .extra-item-row {
      padding: 8px 10px;
    }
    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 8px;
      background: #ffffff;
      border-radius: 10px;
      padding: 6px 4px;
      border: 1px solid #f0ede5;
      flex-wrap: wrap;
    }
    .task-name {
      font-weight: 500;
      font-size: 14px;
      min-width: 80px;
      padding: 4px 2px;
      word-break: keep-all;
      color: #2d3436;
    }
    .status-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f3ef;
      border: 1.5px solid #d5cec2;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      color: #b0a797;
    }
    .status-btn.done {
      background: #e3f0e1;
      border-color: #9abf8c;
      color: #3b6e3b;
    }
    .improve-input {
      flex: 1 1 120px;
      min-width: 100px;
      border: 1px solid #e2ded6;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: 0.2s;
      width: 100%;
      word-break: break-word;
    }
    .improve-input:focus {
      border-color: #b8c9d6;
      box-shadow: 0 0 0 2px rgba(184,201,214,0.15);
    }
    .improve-input::placeholder {
      color: #c5bfb5;
      font-size: 12px;
    }

    .extra-task-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      background: #fcfaf8;
      border-radius: 10px;
      padding: 6px 4px;
      border: 1px dashed #d5cfc5;
      flex-wrap: wrap;
    }
    .extra-input {
      flex: 2;
      min-width: 120px;
      border: 1px solid #e2ded6;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 13px;
      background: #fff;
      outline: none;
    }
    .extra-input::placeholder {
      color: #b0a797;
      font-style: italic;
    }

    .summary-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }
    .summary-card {
      background: #faf9f7;
      border: 1px solid #e0dcd2;
      border-radius: 14px;
      padding: 14px;
    }
    .summary-card h4 {
      font-size: 14px;
      font-weight: 700;
      color: #4a4440;
      margin-bottom: 6px;
    }
    .summary-card textarea {
      width: 100%;
      border: 1px solid #e2ded6;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 70px;
      background: #fff;
      outline: none;
    }
    .summary-card textarea:focus {
      border-color: #b8c9d6;
    }
    .summary-card textarea::placeholder {
      color: #c5bfb5;
      font-size: 12.5px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">📋 每日计划</div>
    <div class="date-row">
      <input type="date" id="datePicker">
      <button class="today-btn" id="todayBtn">今天</button>
    </div>
  </div>

  <!-- 上午 -->
  <div class="period-card" id="card-morning">
    <div class="period-header"><span class="icon">🌅</span> 上午</div>
    <div class="regular-list" id="morning-list"></div>
    <div class="extra-item-row" style="padding:6px 10px 10px;">
      <div class="extra-task-row">
        <span style="font-weight:500;font-size:13px;white-space:nowrap;padding:4px;">额外</span>
        <input class="extra-input extra-morning-text" placeholder="临时任务…">
        <span class="status-btn extra-morning-check" style="font-size:16px;">❌</span>
        <input class="improve-input extra-morning-improve" placeholder="备注…" style="flex:1;">
      </div>
    </div>
  </div>

  <!-- 中午 -->
  <div class="period-card" id="card-noon">
    <div class="period-header"><span class="icon">☀️</span> 中午</div>
    <div class="regular-list" id="noon-list"></div>
    <div class="extra-item-row" style="padding:6px 10px 10px;">
      <div class="extra-task-row">
        <span style="font-weight:500;font-size:13px;white-space:nowrap;padding:4px;">额外</span>
        <input class="extra-input extra-noon-text" placeholder="临时任务…">
        <span class="status-btn extra-noon-check" style="font-size:16px;">❌</span>
        <input class="improve-input extra-noon-improve" placeholder="备注…" style="flex:1;">
      </div>
    </div>
  </div>

  <!-- 下午 -->
  <div class="period-card" id="card-afternoon">
    <div class="period-header"><span class="icon">🌤️</span> 下午</div>
    <div class="regular-list" id="afternoon-list"></div>
    <div class="extra-item-row" style="padding:6px 10px 10px;">
      <div class="extra-task-row">
        <span style="font-weight:500;font-size:13px;white-space:nowrap;padding:4px;">额外</span>
        <input class="extra-input extra-afternoon-text" placeholder="临时任务…">
        <span class="status-btn extra-afternoon-check" style="font-size:16px;">❌</span>
        <input class="improve-input extra-afternoon-improve" placeholder="备注…" style="flex:1;">
      </div>
    </div>
  </div>

  <!-- 晚上 -->
  <div class="period-card" id="card-evening">
    <div class="period-header"><span class="icon">🌙</span> 晚上</div>
    <div class="regular-list" id="evening-list"></div>
    <div class="extra-item-row" style="padding:6px 10px 10px;">
      <div class="extra-task-row">
        <span style="font-weight:500;font-size:13px;white-space:nowrap;padding:4px;">额外</span>
        <input class="extra-input extra-evening-text" placeholder="临时任务…">
        <span class="status-btn extra-evening-check" style="font-size:16px;">❌</span>
        <input class="improve-input extra-evening-improve" placeholder="备注…" style="flex:1;">
      </div>
    </div>
  </div>

  <!-- 总结区 -->
  <div class="summary-section">
    <div class="summary-card">
      <h4>📋 今日总体总结</h4>
      <textarea id="overallSummary" placeholder="今天整体状态、收获、困难…"></textarea>
    </div>
    <div class="summary-card">
      <h4>🔧 明天改进计划</h4>
      <textarea id="tomorrowPlan" placeholder="明天重点优化的地方…"></textarea>
    </div>
  </div>
</div>

<script>
  (function() {
    // 常规项目定义
    const regularItems = {
      morning: ["7点早起", "早餐", "拖地", "洗衣服", "随机清洁", "猫猫清洁", "看财经内容", "写作9点起", "吃水果"],
      noon: ["吃饭12点", "休息", "午睡13点"],
      afternoon: ["写作14点起", "做题1小时", "运动30分钟"],
      evening: ["晚饭17点", "洗澡19点", "修文", "看书30分钟", "写日记", "睡觉23点"]
    };

    const STORAGE_KEY_PREFIX = 'mobilePlan_';
    const datePicker = document.getElementById('datePicker');
    const todayBtn = document.getElementById('todayBtn');
    const overallSummary = document.getElementById('overallSummary');
    const tomorrowPlan = document.getElementById('tomorrowPlan');

    // 创建常规任务行
    function createTaskRow(taskName) {
      const row = document.createElement('div');
      row.className = 'task-row';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'task-name';
      nameSpan.textContent = taskName;

      const statusBtn = document.createElement('span');
      statusBtn.className = 'status-btn';
      statusBtn.textContent = '❌';
      statusBtn.setAttribute('role', 'checkbox');
      statusBtn.setAttribute('aria-checked', 'false');
      statusBtn.onclick = function(e) {
        e.stopPropagation();
        if (this.classList.contains('done')) {
          this.classList.remove('done');
          this.textContent = '❌';
          this.setAttribute('aria-checked', 'false');
        } else {
          this.classList.add('done');
          this.textContent = '✅';
          this.setAttribute('aria-checked', 'true');
        }
        saveCurrentData();
      };

      const improveInput = document.createElement('input');
      improveInput.type = 'text';
      improveInput.className = 'improve-input';
      improveInput.placeholder = '改进…';
      improveInput.addEventListener('input', saveCurrentData);

      row.appendChild(nameSpan);
      row.appendChild(statusBtn);
      row.appendChild(improveInput);
      return row;
    }

    function renderAllLists() {
      const periods = ['morning', 'noon', 'afternoon', 'evening'];
      const containerIds = ['morning-list', 'noon-list', 'afternoon-list', 'evening-list'];
      periods.forEach((period, idx) => {
        const container = document.getElementById(containerIds[idx]);
        container.innerHTML = '';
        regularItems[period].forEach(task => {
          container.appendChild(createTaskRow(task));
        });
      });
    }

    // 收集所有状态
    function getAllTaskData() {
      const data = { regular: {}, extra: {} };
      // 常规项目
      document.querySelectorAll('.regular-list .task-row').forEach(row => {
        const name = row.querySelector('.task-name')?.textContent.trim();
        const statusBtn = row.querySelector('.status-btn');
        const improveInput = row.querySelector('.improve-input');
        if (name && statusBtn && improveInput) {
          data.regular[name] = {
            done: statusBtn.classList.contains('done'),
            improvement: improveInput.value
          };
        }
      });
      // 额外项目
      const periods = ['morning', 'noon', 'afternoon', 'evening'];
      periods.forEach(p => {
        const textEl = document.querySelector(`.extra-${p}-text`);
        const checkEl = document.querySelector(`.extra-${p}-check`);
        const improveEl = document.querySelector(`.extra-${p}-improve`);
        data.extra[p] = {
          text: textEl?.value || '',
          done: checkEl?.classList.contains('done') || false,
          improvement: improveEl?.value || ''
        };
      });
      data.overallSummary = overallSummary.value;
      data.tomorrowPlan = tomorrowPlan.value;
      return data;
    }

    function saveCurrentData() {
      const date = datePicker.value;
      if (!date) return;
      const data = getAllTaskData();
      localStorage.setItem(STORAGE_KEY_PREFIX + date, JSON.stringify(data));
    }

    function loadDataForDate(date) {
      if (!date) return;
      const raw = localStorage.getItem(STORAGE_KEY_PREFIX + date);
      if (!raw) {
        // 清空所有状态
        document.querySelectorAll('.status-btn').forEach(btn => {
          btn.classList.remove('done');
          btn.textContent = '❌';
          btn.setAttribute('aria-checked', 'false');
        });
        document.querySelectorAll('.improve-input, .extra-input').forEach(input => input.value = '');
        overallSummary.value = '';
        tomorrowPlan.value = '';
        return;
      }
      const data = JSON.parse(raw);
      // 恢复常规项目
      document.querySelectorAll('.regular-list .task-row').forEach(row => {
        const name = row.querySelector('.task-name')?.textContent.trim();
        const statusBtn = row.querySelector('.status-btn');
        const improveInput = row.querySelector('.improve-input');
        if (name && data.regular && data.regular[name]) {
          const saved = data.regular[name];
          if (saved.done) {
            statusBtn.classList.add('done');
            statusBtn.textContent = '✅';
            statusBtn.setAttribute('aria-checked', 'true');
          } else {
            statusBtn.classList.remove('done');
            statusBtn.textContent = '❌';
            statusBtn.setAttribute('aria-checked', 'false');
          }
          improveInput.value = saved.improvement || '';
        } else {
          if (statusBtn) statusBtn.classList.remove('done');
          if (statusBtn) statusBtn.textContent = '❌';
          if (improveInput) improveInput.value = '';
        }
      });
      // 额外项目
      const periods = ['morning', 'noon', 'afternoon', 'evening'];
      periods.forEach(p => {
        const textEl = document.querySelector(`.extra-${p}-text`);
        const checkEl = document.querySelector(`.extra-${p}-check`);
        const improveEl = document.querySelector(`.extra-${p}-improve`);
        if (data.extra && data.extra[p]) {
          if (textEl) textEl.value = data.extra[p].text || '';
          if (checkEl) {
            if (data.extra[p].done) {
              checkEl.classList.add('done');
              checkEl.textContent = '✅';
            } else {
              checkEl.classList.remove('done');
              checkEl.textContent = '❌';
            }
          }
          if (improveEl) improveEl.value = data.extra[p].improvement || '';
        } else {
          if (textEl) textEl.value = '';
          if (checkEl) { checkEl.classList.remove('done'); checkEl.textContent = '❌'; }
          if (improveEl) improveEl.value = '';
        }
      });
      overallSummary.value = data.overallSummary || '';
      tomorrowPlan.value = data.tomorrowPlan || '';
    }

    function setToday() {
      const today = new Date().toISOString().split('T')[0];
      datePicker.value = today;
      loadDataForDate(today);
    }

    // 绑定额外项目的保存监听
    function bindExtraListeners() {
      document.querySelectorAll('.extra-input, .extra-morning-improve, .extra-noon-improve, .extra-afternoon-improve, .extra-evening-improve')
        .forEach(el => el.addEventListener('input', saveCurrentData));
      document.querySelectorAll('[class*="extra-"][class*="-check"]').forEach(btn => {
        btn.addEventListener('click', function(e) {
          if (this.classList.contains('done')) {
            this.classList.remove('done');
            this.textContent = '❌';
          } else {
            this.classList.add('done');
            this.textContent = '✅';
          }
          saveCurrentData();
        });
      });
    }

    datePicker.addEventListener('change', function() {
      loadDataForDate(this.value);
    });
    todayBtn.addEventListener('click', setToday);

    overallSummary.addEventListener('input', saveCurrentData);
    tomorrowPlan.addEventListener('input', saveCurrentData);

    // 初始化
    renderAllLists();
    bindExtraListeners();
    setToday();
  })();
</script>
</body>
</html>
